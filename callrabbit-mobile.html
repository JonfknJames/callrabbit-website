<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CALL RABBIT | AI Phone &amp; Text Agent Platform</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#131318;color:#E4E1E8;font-family:'Manrope',sans-serif;overflow-x:hidden;min-height:100dvh;display:flex;flex-direction:column;}
.pill{background:#1F1F24;border-radius:9999px;box-shadow:12px 12px 24px rgba(0,0,0,0.4),inset 1px 1px 0 rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);}
.sunken{background:#0E0E13;box-shadow:inset 4px 4px 8px rgba(0,0,0,0.5),1px 1px 0 rgba(255,255,255,0.02);color:#E4E1E8;}
.btn-green{background:#10B981;color:#003824;border:none;border-radius:16px;font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;height:52px;width:100%;}
</style>
</head>
<body>

<!-- NAV -->
<div style="padding:12px 16px 0;">
<div class="pill" style="padding:10px 20px;text-align:center;">
<span style="font-weight:800;font-size:16px;letter-spacing:0.1em;color:#BBCABF;">CALL</span>
<span style="font-weight:800;font-size:16px;letter-spacing:0.1em;color:#C9A962;margin-left:4px;">RABBIT</span>
</div>
</div>

<!-- 3D RABBIT -->
<div id="rabbit" style="width:100%;height:300px;cursor:grab;"></div>

<!-- COMING SOON -->
<div style="text-align:center;padding:0 24px;">
<h1 style="font-size:28px;font-weight:800;line-height:1.2;margin-bottom:12px;">
<span style="color:#10B981;">Answer calls</span><br/>and automate your business
</h1>
<p style="font-size:20px;font-weight:700;color:#10B981;letter-spacing:0.05em;margin-bottom:8px;">Coming Soon</p>
<p style="font-size:15px;color:#BBCABF;line-height:1.5;">Custom built for your business with zero hold music and zero missed calls.</p>
</div>

<!-- CONTACT FORM -->
<div style="padding:0 16px;">
<div class="pill" style="border-radius:20px;padding:24px 20px;">
<form action="https://formsubmit.co/info@callrabbit.ai" method="POST" style="display:flex;flex-direction:column;gap:16px;">
<input type="hidden" name="_subject" value="New CallRabbit inquiry"/>
<input type="hidden" name="_captcha" value="false"/>
<input type="hidden" name="_next" value="https://callrabbit.ai?thanks=1"/>
<input type="text" name="_honey" style="display:none"/>
<div>
<label style="font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#BBCABF;display:block;margin-bottom:6px;padding-left:4px;">Your Name</label>
<input name="name" required placeholder="John Rabbit" type="text" class="sunken" style="width:100%;height:48px;font-size:16px;border:none;border-radius:12px;padding:0 16px;outline:none;"/>
</div>
<div>
<label style="font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#BBCABF;display:block;margin-bottom:6px;padding-left:4px;">Business Email</label>
<input name="email" required placeholder="growth@company.com" type="email" class="sunken" style="width:100%;height:48px;font-size:16px;border:none;border-radius:12px;padding:0 16px;outline:none;"/>
</div>
<div>
<label style="font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#BBCABF;display:block;margin-bottom:6px;padding-left:4px;">Message</label>
<textarea name="message" required placeholder="Tell us about your automation goals..." rows="3" class="sunken" style="width:100%;font-size:16px;border:none;border-radius:12px;padding:12px 16px;outline:none;resize:none;font-family:'Manrope',sans-serif;"></textarea>
</div>
<button type="submit" class="btn-green">Send Message</button>
</form>
</div>
</div>

<!-- FOOTER -->
<div style="text-align:center;padding:32px 16px 24px;margin-top:auto;">
<img src="logo-woodcut.png" alt="CallRabbit" style="height:60px;opacity:0.5;margin-bottom:12px;"/>
<div style="font-size:13px;font-weight:700;color:#BBCABF;letter-spacing:0.08em;margin-bottom:10px;">CALL RABBIT</div>
<div style="font-size:11px;color:#BBCABF80;letter-spacing:0.06em;margin-bottom:6px;">
<a href="privacy.html" style="color:inherit;text-decoration:none;margin:0 8px;">Privacy</a>
<a href="terms.html" style="color:inherit;text-decoration:none;margin:0 8px;">Terms</a>
<a href="security.html" style="color:inherit;text-decoration:none;margin:0 8px;">Security</a>
</div>
<div style="font-size:10px;color:#BBCABF50;letter-spacing:0.06em;">&copy; 2026 CALL RABBIT. All rights reserved.</div>
</div>

<!-- 3D RABBIT SCRIPT -->
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
const c=document.getElementById('rabbit');
if(c){
const s=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(40,c.clientWidth/c.clientHeight,0.1,100);
cam.position.set(0,0.8,3.2);
const r=new THREE.WebGLRenderer({antialias:true,alpha:true});
r.setSize(c.clientWidth,c.clientHeight);
r.setPixelRatio(Math.min(window.devicePixelRatio,2));
r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.25;
r.outputColorSpace=THREE.SRGBColorSpace;
c.appendChild(r.domElement);
s.add(new THREE.DirectionalLight(0xeec88a,2.4).position.set(2,3,3)||s.children[s.children.length-1]);
const k=new THREE.DirectionalLight(0xeec88a,2.4);k.position.set(2,3,3);s.add(k);
const f=new THREE.DirectionalLight(0xd4b896,1.1);f.position.set(-3,1,2);s.add(f);
const ri=new THREE.DirectionalLight(0xccaa77,0.7);ri.position.set(0,2,-3);s.add(ri);
s.add(new THREE.AmbientLight(0x2a2018,1.2));
const g=new THREE.PointLight(0xddb877,0.5,6);g.position.set(0,0,2);s.add(g);
const ctrl=new OrbitControls(cam,r.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=0.05;ctrl.enableZoom=false;ctrl.enablePan=false;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=1.2;
ctrl.minPolarAngle=Math.PI*0.2;ctrl.maxPolarAngle=Math.PI*0.75;
let m=null;
new GLTFLoader().load('rabbit-logo.glb',function(gltf){
m=gltf.scene;
const b=new THREE.Box3().setFromObject(m);
const sz=b.getSize(new THREE.Vector3());
m.scale.setScalar(2.0/Math.max(sz.x,sz.y,sz.z));
const sb=new THREE.Box3().setFromObject(m);
m.position.sub(sb.getCenter(new THREE.Vector3()));
s.add(m);ctrl.target.set(0,0,0);ctrl.update();
});
const cl=new THREE.Clock();
(function a(){requestAnimationFrame(a);
const e=cl.getElapsedTime();
if(m)m.position.y=Math.sin(e*0.8)*0.04;
g.intensity=0.6+Math.sin(e*1.5)*0.15;
ctrl.update();r.render(s,cam);})();
new ResizeObserver(function(){
const w=c.clientWidth,h=c.clientHeight;
cam.aspect=w/h;cam.updateProjectionMatrix();r.setSize(w,h);
}).observe(c);
}
</script>
</body>
</html>
