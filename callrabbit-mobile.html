{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html{overflow-x:hidden;}
body{
  background-color:#131318;
  background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:24px 24px;
  color:#E4E1E8;
  font-family:'Manrope',sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}

/* CSS Parallax Stars */
#css-stars-1,#css-stars-2,#css-stars-3{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:transparent;pointer-events:none;z-index:0;
}
#css-stars-1{width:1px;height:1px;animation:starDrift 180s linear infinite;}
#css-stars-1::after{content:"";position:absolute;top:3000px;width:1px;height:1px;background:transparent;box-shadow:inherit;}
#css-stars-2{width:2px;height:2px;animation:starDrift 320s linear infinite;}
#css-stars-2::after{content:"";position:absolute;top:3000px;width:2px;height:2px;background:transparent;box-shadow:inherit;}
#css-stars-3{width:3px;height:3px;animation:starDrift 450s linear infinite;}
#css-stars-3::after{content:"";position:absolute;top:3000px;width:3px;height:3px;background:transparent;box-shadow:inherit;}
@keyframes starDrift{from{transform:translateY(0);}to{transform:translateY(-3000px);}}

/* Layout */
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100dvh;}

/* Nav */
#nav{padding:16px 16px 0;width:100%;}
.pill{
  background:#1F1F24;border-radius:9999px;
  box-shadow:12px 12px 24px rgba(0,0,0,0.4),inset 1px 1px 0 rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.05);
}
#nav .pill{padding:10px 24px;display:flex;align-items:center;justify-content:center;}
#navbar-3d-container{width:240px;height:36px;cursor:pointer;display:block;position:relative;}
#nav-logo-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:0.08em;color:transparent;text-transform:uppercase;opacity:0;transition:opacity 0.3s ease;}

/* Rabbit */
#rabbit-wrap{width:100%;padding:0 16px;margin-top:32px;}
#rabbit{width:100%;height:300px;cursor:grab;}
#rabbit:active{cursor:grabbing;}
#rabbit canvas{display:block;width:100%!important;height:100%!important;}

/* Contact section */
#contact{width:100%;padding:48px 16px 0;}
/* Neumorphic card */
.tactile-raised{
  background-color:#1F1F24;
  box-shadow:20px 20px 40px rgba(0,0,0,0.4),inset 1px 1px 0px rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:24px;
  padding:24px;
}

/* Form fields */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field:last-of-type{margin-bottom:0;}
.field label{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#BBCABF;padding-left:4px;}
.field input,.field textarea{
  background:#0E0E13;
  border:none;
  border-radius:12px;
  box-shadow:inset 4px 4px 8px rgba(0,0,0,0.5),1px 1px 0px rgba(255,255,255,0.02);
  color:#E4E1E8;
  font-family:'Manrope',sans-serif;
  font-size:16px;
  padding:14px 16px;
  outline:none;
  width:100%;
  -webkit-appearance:none;
}
.field input:focus,.field textarea:focus{
  box-shadow:inset 4px 4px 8px rgba(0,0,0,0.5),0 0 0 1px #10B981;
}
.field textarea{resize:none;}
.field input::placeholder,.field textarea::placeholder{color:rgba(187,202,191,0.3);}

.btn-submit{
  width:100%;
  margin-top:24px;
  background-color:#10B981;
  color:#003824;
  border:none;
  border-radius:16px;
  font-family:'Manrope',sans-serif;
  font-weight:800;
  font-size:14px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  height:56px;
  box-shadow:8px 8px 16px rgba(0,0,0,0.4),inset 1px 1px 0px rgba(255,255,255,0.2);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:12px 12px 24px rgba(0,0,0,0.5),inset 1px 1px 0px rgba(255,255,255,0.3);}
.btn-submit:active{transform:translateY(0);box-shadow:inset 4px 4px 8px rgba(0,0,0,0.6);}

/* Footer */
footer{
  width:100%;
  margin-top:48px;
  background:#0E0E13;
  box-shadow:inset 0px 4px 12px rgba(0,0,0,0.5);
  padding:32px 16px;
  position:relative;z-index:1;
}
.footer-inner{display:flex;flex-direction:column;align-items:center;gap:16px;}
.footer-brand{font-size:14px;font-weight:800;color:#BBCABF;letter-spacing:0.08em;}
.footer-links{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.footer-links a{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(187,202,191,0.6);text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:#E4E1E8;}
.footer-copy{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(187,202,191,0.4);}

/* ElevenLabs widget CSS vars */
elevenlabs-convai{
  --el-bg-color:#1F1F24;
  --el-text-color:#E4E1E8;
  --el-btn-color:#10B981;
  --el-btn-text-color:#003824;
  --el-border-color:rgba(255,255,255,0.05);
  --el-focus-color:#10B981;
  --el-powered-by-display:none;
}
elevenlabs-convai+div[style*="Powered"],[class*="powered-by"],a[href*="elevenlabs.io"][target="_blank"]{display:none!important;}

/* Widget wrap — margin creates 16px gutter; absolutely-positioned children use inset:0 */
#widget-wrap{
  margin:32px 16px 0;
  position:relative;
  height:68px;
}

/* Visual pill — decorative only; pointer-events:none so taps fall through to overlay */
#call-btn-visual{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  gap:14px;
  background:#1F1F24;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:9999px;
  box-shadow:12px 12px 24px rgba(0,0,0,0.4),inset 1px 1px 0 rgba(255,255,255,0.06);
  padding:12px 16px 12px 12px;
  pointer-events:none;
}
#call-btn-visual img{
  width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;
}
#call-btn-label{
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;flex:1;
}
#call-btn-label .btn-title{
  font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;
  color:#E4E1E8;letter-spacing:0.01em;line-height:1.2;
}
#call-btn-label .btn-sub{
  font-family:'Manrope',sans-serif;font-size:11px;color:#BBCABF;
  font-weight:500;letter-spacing:0.06em;text-transform:uppercase;line-height:1.2;
}
#call-btn-icon{
  margin-left:auto;
  width:36px;height:36px;border-radius:50%;
  background:#10B981;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:4px 4px 8px rgba(0,0,0,0.3),inset 1px 1px 0 rgba(255,255,255,0.2);
}

/* Widget overlay — actual ElevenLabs element on top; invisible but receives taps */
#widget-overlay{
  position:absolute;
  inset:0;
  z-index:2;
  overflow:hidden;
  border-radius:9999px;
}
</style>

<!-- Three.js -->
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ── 3D TEXT (nav pill) ──────────────────────────────────────────
const textContainer = document.getElementById('navbar-3d-container');
if (textContainer) {
  const w = textContainer.clientWidth, h = textContainer.clientHeight;
  const aspect = w / h;
  const frustumHeight = 1.2;
  const textScene = new THREE.Scene();
  const textCam = new THREE.OrthographicCamera(
    -frustumHeight * aspect / 2, frustumHeight * aspect / 2,
    frustumHeight / 2, -frustumHeight / 2, 0.1, 50
  );
  textCam.position.set(0, 0, 5);
  const textRenderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
  textRenderer.setSize(w, h);
  textRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  textRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  textRenderer.toneMappingExposure = 1.2;
  textRenderer.outputColorSpace = THREE.SRGBColorSpace;
  textContainer.appendChild(textRenderer.domElement);

  textScene.add(new THREE.AmbientLight(0x111008, 0.3));
  const tKey = new THREE.DirectionalLight(0xeec88a, 0.5);
  tKey.position.set(2, 2, 3); textScene.add(tKey);
  const tSpot = new THREE.SpotLight(0xeedd99, 6.0, 10, Math.PI * 0.3, 0.5, 1.5);
  tSpot.position.set(-4, 0, 4);
  const tTarget = new THREE.Object3D(); tTarget.position.set(0, 0, 0);
  textScene.add(tTarget); tSpot.target = tTarget; textScene.add(tSpot);

  new GLTFLoader().load('rabbit-text.glb', (gltf) => {
    const textModel = gltf.scene;
    const box = new THREE.Box3().setFromObject(textModel);
    const size = box.getSize(new THREE.Vector3());
    const scale = (frustumHeight * 0.7) / (size.y || size.z || 1);
    textModel.scale.multiplyScalar(scale);
    const sb = new THREE.Box3().setFromObject(textModel);
    textModel.position.sub(sb.getCenter(new THREE.Vector3()));
    textModel.traverse(c => { if (c.isMesh && c.material) { c.material.metalness = 0.6; c.material.roughness = 0.3; c.material.needsUpdate = true; } });
    textScene.add(textModel);
  }, undefined, () => {
    const fb = document.getElementById('nav-logo-fallback');
    if (fb) { fb.style.color = '#BBCABF'; fb.style.opacity = '1'; }
  });

  (function animateText() {
    requestAnimationFrame(animateText);
    textRenderer.render(textScene, textCam);
  })();

  new ResizeObserver(() => {
    const w2 = textContainer.clientWidth, h2 = textContainer.clientHeight, a2 = w2 / h2;
    textCam.left = -frustumHeight * a2 / 2; textCam.right = frustumHeight * a2 / 2;
    textCam.top = frustumHeight / 2; textCam.bottom = -frustumHeight / 2;
    textCam.updateProjectionMatrix(); textRenderer.setSize(w2, h2);
  }).observe(textContainer);
}

// ── 3D RABBIT (main) ────────────────────────────────────────────
const rabbitContainer = document.getElementById('rabbit');
if (rabbitContainer) {
  const rabbitScene = new THREE.Scene();
  const rabbitCam = new THREE.PerspectiveCamera(40, rabbitContainer.clientWidth / rabbitContainer.clientHeight, 0.1, 100);
  rabbitCam.position.set(0, 0.8, 3.2);

  const rabbitRenderer = new THREE.WebGLRenderer({antialias: true, alpha: true, powerPreference: 'high-performance'});
  rabbitRenderer.setSize(rabbitContainer.clientWidth, rabbitContainer.clientHeight);
  rabbitRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  rabbitRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  rabbitRenderer.toneMappingExposure = 1.25;
  rabbitRenderer.outputColorSpace = THREE.SRGBColorSpace;
  rabbitContainer.appendChild(rabbitRenderer.domElement);

  const kLight = new THREE.DirectionalLight(0xeec88a, 2.4); kLight.position.set(2, 3, 3); rabbitScene.add(kLight);
  const fLight = new THREE.DirectionalLight(0xd4b896, 1.1); fLight.position.set(-3, 1, 2); rabbitScene.add(fLight);
  const rLight = new THREE.DirectionalLight(0xccaa77, 0.7); rLight.position.set(0, 2, -3); rabbitScene.add(rLight);
  rabbitScene.add(new THREE.AmbientLight(0x2a2018, 1.2));
  const glow = new THREE.PointLight(0xddb877, 0.5, 6); glow.position.set(0, 0, 2); rabbitScene.add(glow);

  const controls = new OrbitControls(rabbitCam, rabbitRenderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.enableZoom = false; controls.enablePan = false;
  controls.autoRotate = true; controls.autoRotateSpeed = 1.2;
  controls.minPolarAngle = Math.PI * 0.2; controls.maxPolarAngle = Math.PI * 0.75;

  // Elastic restore
  const restPolarAngle = Math.PI * 0.45;
  let isRestoring = false;
  let interactionTimeout;
  controls.addEventListener('start', () => { controls.autoRotate = false; isRestoring = false; clearTimeout(interactionTimeout); });
  controls.addEventListener('end', () => { interactionTimeout = setTimeout(() => { controls.autoRotate = true; isRestoring = true; }, 2000); });

  let rabbitModel = null;
  new GLTFLoader().load('rabbit-logo.glb', (gltf) => {
    rabbitModel = gltf.scene;
    const box = new THREE.Box3().setFromObject(rabbitModel);
    const sz = box.getSize(new THREE.Vector3());
    rabbitModel.scale.setScalar(2.0 / Math.max(sz.x, sz.y, sz.z));
    const sb = new THREE.Box3().setFromObject(rabbitModel);
    rabbitModel.position.sub(sb.getCenter(new THREE.Vector3()));
    rabbitScene.add(rabbitModel); controls.target.set(0, 0, 0); controls.update();
  });

  const clock = new THREE.Clock();
  (function animateRabbit() {
    requestAnimationFrame(animateRabbit);
    const e = clock.getElapsedTime();
    if (rabbitModel) rabbitModel.position.y = Math.sin(e * 0.8) * 0.04;
    glow.intensity = 0.6 + Math.sin(e * 1.5) * 0.15;

    if (isRestoring) {
      const current = controls.getPolarAngle();
      if (Math.abs(current - restPolarAngle) > 0.005) {
        const next = current + (restPolarAngle - current) * 0.005;
        controls.minPolarAngle = next; controls.maxPolarAngle = next;
      } else {
        isRestoring = false;
        controls.minPolarAngle = Math.PI * 0.2; controls.maxPolarAngle = Math.PI * 0.75;
      }
    }

    controls.update(); rabbitRenderer.render(rabbitScene, rabbitCam);
  })();

  new ResizeObserver(() => {
    const w = rabbitContainer.clientWidth, h = rabbitContainer.clientHeight;
    rabbitCam.aspect = w / h; rabbitCam.updateProjectionMatrix(); rabbitRenderer.setSize(w, h);
  }).observe(rabbitContainer);
}
</script>

<!-- ElevenLabs: overlay + styling + auto-collapse -->
<script>
(function styleWidget() {
  const widget = document.querySelector('elevenlabs-convai');
  if (!widget || !widget.shadowRoot) return setTimeout(styleWidget, 500);
  const root = widget.shadowRoot;
  const style = document.createElement('style');
  style.textContent = `
    /* Make host fill the #widget-overlay container */
    :host {
      display:block!important;
      width:100%!important;
      height:100%!important;
      position:absolute!important;
      inset:0!important;
      overflow:visible!important;
    }
    /* Launcher button — invisible but covers the full pill so native taps hit it */
    [class*="fab"],[class*="bubble"],[class*="trigger"],[class*="launcher"],
    [class*="start"],[class*="open-btn"],[class*="toggle"],
    button[aria-label*="open" i],button[aria-label*="call" i] {
      position:absolute!important;
      inset:0!important;
      width:100%!important;
      height:100%!important;
      opacity:0.001!important;
      border-radius:9999px!important;
      margin:0!important;
      padding:0!important;
      transform:none!important;
      min-width:unset!important;
      min-height:unset!important;
    }
    /* Expanded panel — fixed and centred in the viewport */
    [class*="card"],[class*="panel"],[class*="dialog"],[class*="chat"],
    [class*="sheet"],[class*="conversation"],[class*="modal"] {
      position:fixed!important;
      top:50%!important;
      left:50%!important;
      transform:translate(-50%,-50%)!important;
      bottom:unset!important;
      right:unset!important;
      margin:0!important;
      background:#1F1F24!important;
      border:1px solid rgba(255,255,255,0.05)!important;
      box-shadow:20px 20px 40px rgba(0,0,0,0.4),inset 1px 1px 0px rgba(255,255,255,0.05)!important;
      border-radius:24px!important;
    }
    input,textarea{
      background:#0E0E13!important;border:none!important;border-radius:12px!important;
      box-shadow:inset 4px 4px 8px rgba(0,0,0,0.5),1px 1px 0px rgba(255,255,255,0.02)!important;
      color:#E4E1E8!important;
    }
    *{color:#E4E1E8!important;}
    p,span,label,[class*="subtitle"],[class*="secondary"]{color:#BBCABF!important;}
    a[href*="elevenlabs"],[class*="powered"],[class*="branding"]{display:none!important;}
  `;
  root.appendChild(style);
  const hideBranding = () => root.querySelectorAll('*').forEach(el => {
    if (el.textContent && el.textContent.includes('Powered by') && el.children.length < 3) el.style.display = 'none';
  });
  hideBranding();
  new MutationObserver(hideBranding).observe(root, {childList:true, subtree:true});
})();

// Auto-collapse widget when the call ends
(function watchCallEnd() {
  const widget = document.querySelector('elevenlabs-convai');
  if (!widget) return setTimeout(watchCallEnd, 1000);

  function collapseWidget() {
    const root = widget.shadowRoot;
    if (!root) return;
    // Try labelled close/back button first
    const closeBtn = root.querySelector(
      '[aria-label*="close" i],[aria-label*="back" i],[aria-label*="minimise" i],' +
      '[aria-label*="minimize" i],[class*="close"],[class*="collapse"],[class*="back"]'
    );
    if (closeBtn) { closeBtn.click(); return; }
    // Fallback: click launcher to toggle the panel closed
    const launcher = root.querySelector('[class*="fab"],[class*="bubble"],[class*="trigger"],[class*="launcher"]');
    if (launcher) launcher.click();
  }

  // Prefer native event (fires reliably when widget supports it)
  widget.addEventListener('elevenlabs-convai:call_ended', () => setTimeout(collapseWidget, 1500));

  // Mutation-observer fallback: watch for "End call" button disappearing after being present
  (function setupObserver() {
    if (!widget.shadowRoot) return setTimeout(setupObserver, 1000);
    const root = widget.shadowRoot;
    let wasInCall = false;
    new MutationObserver(function() {
      const hasEndBtn = Array.from(root.querySelectorAll('button')).some(
        b => b.textContent && b.textContent.trim().toLowerCase().includes('end call')
      );
      if (hasEndBtn) { wasInCall = true; return; }
      if (wasInCall) {
        wasInCall = false;
        setTimeout(collapseWidget, 1500);
      }
    }).observe(root, {childList:true, subtree:true, characterData:true});
  })();
