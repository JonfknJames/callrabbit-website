<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes pulse {
      0%, 100% { r: 10; opacity: 1; }
      50% { r: 12; opacity: 0.8; }
    }
    .glow {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
  <circle cx="16" cy="16" r="14" fill="#09090b"/>
  <circle cx="16" cy="16" r="6" fill="#22c55e" opacity="0.2"/>
  <circle class="glow" cx="16" cy="16" r="10" fill="#22c55e"/>
</svg>
