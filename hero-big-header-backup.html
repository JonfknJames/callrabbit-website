<section id="hero" class="relative w-full rounded-3xl p-6 md:p-12 lg:p-20 tactile-raised overflow-hidden flex flex-col md:flex-row items-center gap-6 md:gap-12">
<div class="absolute -right-20 -top-20 w-96 h-96 emerald-glow pointer-events-none"></div>
<div class="w-full md:w-3/5 space-y-5 md:space-y-8 relative z-10">
<h1 class="text-3xl sm:text-5xl md:text-7xl font-extrabold tracking-tighter leading-tight text-on-surface text-center">
<span class="text-primary-container">Answer calls</span> and automate your business
            </h1>
<p class="hero-subtext text-on-surface-variant max-w-xl font-medium leading-relaxed text-center mx-auto">
                Deploy hyper-realistic AI voice agents that handle support, booking, and sales 24/7.
            </p>
<p class="hero-subtext text-on-surface-variant max-w-xl font-medium leading-relaxed text-center mx-auto">
                Custom built for your business with zero hold music and zero missed calls.
            </p>
<div class="hero-buttons flex justify-center items-center">
<a href="#contact" class="tactile-button-raised text-on-primary rounded-xl font-bold tracking-wide uppercase inline-block text-center">
                    Get Started
                </a>
<button onclick="openBensonWidget()" class="tactile-button-idle border border-white/5 text-on-surface-variant rounded-xl font-bold tracking-wide uppercase hover:text-on-surface transition-colors">

</div>
<div class="hero-logo-wrap w-full md:w-2/5 flex justify-center items-center relative">
