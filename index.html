<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CALL RABBIT</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#131318;}
    iframe{border:none;width:100%;height:100%;display:block;}
  </style>
</head>
<body>
  <script>
    var base = window.innerWidth < 768 ? 'callrabbit-mobile.html' : 'callrabbit-v2.html';
    var src = base + '?v=' + Date.now();
    var iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'microphone; camera; autoplay; clipboard-write');
    document.body.appendChild(iframe);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=callrabbit-v2.html"/>
  </noscript>
</body>
</html>
